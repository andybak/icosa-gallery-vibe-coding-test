<!doctype html>
<meta charset="utf-8">
<html>
<head>
    <title>Icosa Viewer</title>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            background: #1d222e;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
                "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/",
                "three-icosa": "./viewer/three-icosa.module.js",
                "three-tiltloader": "https://cdn.jsdelivr.net/npm/three-tiltloader@0.4.2-alpha.4/dist/three-tiltloader.module.js",
                "@sparkjsdev/spark": "https://cdn.jsdelivr.net/gh/sparkjsdev/spark@b60e9d9acbe621e67eda5d98417fcfdea5af6291/dist/spark.module.js"
            }
        }
    </script>
    <link rel="stylesheet" href="./viewer/css/style.css">
</head>
<body>
<div id="icosa-viewer" style="width:100%;height:100vh;position:relative;"></div>
<script type="module">
    import { Viewer } from './viewer/icosa-viewer.module.js';

    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const format = (params.get('format') || '').toUpperCase();
    const mtlUrl = params.get('mtlUrl');

    if (!url) {
        document.body.innerHTML = '<div style="color:white;padding:20px;">No URL provided</div>';
    } else {
        const assetBaseUrl = 'https://icosa-foundation.github.io/icosa-sketch-assets/';
        const viewer = new Viewer(assetBaseUrl);

        try {
            if (format === 'TILT') {
                await viewer.loadTilt(url, {});
            } else if (format === 'OBJ' || format === 'OBJ_NGON') {
                if (mtlUrl) {
                    await viewer.loadObjWithMtl(url, mtlUrl, {});
                } else {
                    await viewer.loadObj(url, {});
                }
            } else if (format === 'FBX') {
                await viewer.loadFbx(url, {});
            } else if (format === 'PLY') {
                await viewer.loadPly(url, {});
            } else if (format === 'STL') {
                await viewer.loadStl(url, {});
            } else if (format === 'USDZ') {
                await viewer.loadUsdz(url, {});
            } else if (format === 'VOX') {
                await viewer.loadVox(url, {});
            } else if (format === 'GLTF1') {
                await viewer.loadGltf1(url, true, {});
            } else {
                // Default: GLTF2 / GLB
                await viewer.loadGltf(url, true, {});
            }
        } catch (e) {
            console.error('Viewer load error:', e);
        }
    }
</script>
</body>
</html>
